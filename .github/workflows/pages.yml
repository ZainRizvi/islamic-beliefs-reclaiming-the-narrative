name: Build & Deploy Book Site

# Builds the AsciiDoc book into a static site and publishes it to GitHub Pages.
# Rebuilds automatically on every push to main that touches the book sources.

on:
  push:
    branches: [main]
    paths:
      - 'book_en/src/**'
      - 'book_en/tools/**'
      - 'book_en/Gemfile'
      - '.github/workflows/pages.yml'
  workflow_dispatch:   # allow manual runs from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress builds.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: book_en
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby + Asciidoctor toolchain
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: book_en

      - name: Install Arabic + Latin fonts (for PDF rendering)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fonts-hosny-amiri fonts-noto-core fonts-noto-extra
          sudo fc-cache -f

      - name: Build site (validate, render tree, HTML + PDF + EPUB)
        run: |
          bundle exec ruby tools/validate.rb src
          bundle exec ruby tools/build_indexes.rb src build/render
          # HTML site (with Amiri web font + verse styling via docinfo)
          EXT=$(find tools/extensions -name '*.rb' -printf '-r ./%p ')
          mkdir -p build/site
          bundle exec asciidoctor $EXT \
            -a toc=left -a sectnums -a sectanchors \
            -a docinfo=shared -a docinfodir="$PWD/tools/web" \
            -D build/site -o index.html build/render/book.adoc
          # Downloadable PDF + EPUB beside the page
          bundle exec asciidoctor-pdf $EXT \
            -a pdf-theme=tools/theme/book-theme.yml \
            -D build/site -o pdf-Islamic-Beliefs-Reclaiming-the-Narrative.pdf build/render/book.adoc
          bundle exec asciidoctor-epub3 $EXT \
            -D build/site -o epub-Islamic-Beliefs-Reclaiming-the-Narrative.epub build/render/book.adoc
          touch build/site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book_en/build/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
