name: Build & Deploy Book Site

# Builds the AsciiDoc book into a static site and publishes it to GitHub Pages.
# Rebuilds automatically on every push to main that touches the book sources.

on:
  push:
    branches: [main]
    paths:
      - 'book_en/src/**'
      - 'book_en/tools/**'
      - 'book_en/Gemfile'
      - 'book_en/Gemfile.lock'
      - '.github/workflows/pages.yml'
  workflow_dispatch:   # allow manual runs from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time. Do NOT cancel in-progress runs: cancelling an
# in-flight deploy can leave the published site partial/stale (GitHub's Pages
# convention). A superseded build simply finishes; the latest push deploys after.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: book_en
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby + Asciidoctor toolchain
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: book_en

      - name: Install Arabic + Latin fonts (for PDF rendering)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fonts-hosny-amiri fonts-noto-core fonts-noto-extra
          sudo fc-cache -f

      - name: Build site (same code path as the local `site` target)
        # Run build.sh so CI and local produce identical output (anchors, flags,
        # downloads). The script's tool commands are overridable, so we point them
        # at bundler — no re-implementation, single source of truth.
        env:
          RUBY: "bundle exec ruby"
          AD: "bundle exec asciidoctor"
          ADPDF: "bundle exec asciidoctor-pdf"
          ADEPUB: "bundle exec asciidoctor-epub3"
        run: bash tools/build.sh site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book_en/build/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
